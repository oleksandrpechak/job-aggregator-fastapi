services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis
  worker:
    build: .
    command: celery -A app.celery_app:celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
  beat:
    build: .
    command: celery -A app.celery_app:celery_app beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
  redis:
    image: redis:8
    ports:
      - "6379:6379"